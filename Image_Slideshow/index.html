<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slide Animation Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Scenery Images</h1>

    <div class="slider-container">
        <div class="slider-wrapper" id="slider_wrapper">
            <img src="images/pic1.jpg" alt="Scenery" id="current_img" />
        </div>
    </div>
    
    <div class="timer-box">
        Next image in: <span id="countdown">3</span>s
    </div>

    <script src="script.js"></script>
</body>
</html>

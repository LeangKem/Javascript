<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie List Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="loader-overlay" class="loader-overlay" style="display: none">
      <div class="spinner"></div>
    </div>

    <div class="container">
      <div class="header-section">
        <h2>List of Movie</h2>
        <button class="btn-show" id="BtShow">Show</button>
      </div>

      <div class="search-nav">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by movie name, type, or rating..."
        />
        <button class="btn-search" id="btnSearch">Search</button>
        <button class="btn-clear" id="btnClear">Clear</button>
      </div>

      <div class="table-wrapper">
        <table id="myTable">
          <thead>
            <tr>
              <th class="text-center">No</th>
              <th>Movie Name</th>
              <th>Types</th>
              <th class="text-center">Image</th>
              <th>Air Date</th>
              <th>Time</th>
              <th class="text-center">Rating</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <div class="pagination-container">
        <div class="pagination-info" id="paginationInfo">
          Showing 0-0 of 0 movies
        </div>
        <div class="pagination-controls" id="paginationControls"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List 3</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/student-list-3.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Student List 3</h1>
            <nav class="breadcrumb">
                <a href="index.html" class="breadcrumb-link">Student List</a>
                <span class="breadcrumb-separator">/</span>
                <a href="student-list-2.html" class="breadcrumb-link">Student List 2</a>
                <span class="breadcrumb-separator">/</span>
                <a href="student-list-3.html" class="breadcrumb-link active">Student List 3</a>
            </nav>
        </header>

        <div class="table-container">
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>NO</th>
                        <th>STUDENT CODE</th>
                        <th>FULLNAME</th>
                        <th>[SEX]</th>
                        <th>CONTACT</th>
                        <th>CREATED DATE</th>
                        <th>ON/OFF</th>
                        <th>DELETE</th>
                        <th>EDIT</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Data will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination-container">
            <div class="pagination-info" id="paginationInfo">
                Showing 1-10 of 50 students
            </div>
            <div class="pagination">
                <button id="prevBtn" class="pagination-btn" disabled>Previous</button>
                <span id="pageNumbers"></span>
                <button id="nextBtn" class="pagination-btn">Next</button>
            </div>
    </div>

    <!-- Load student-data.js first, then script.js, then student-list-3.js -->
    <script src="JS/student-data.js"></script>
    <script src="JS/script.js"></script>
    <script src="JS/student-list-3.js"></script>
</body>
</html>

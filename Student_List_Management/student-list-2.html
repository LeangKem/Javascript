<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List 2</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/student-list-2.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Student List 2</h1>
            <nav class="breadcrumb">
                <a href="index.html" class="breadcrumb-link">Student List</a>
                <span class="breadcrumb-separator">/</span>
                <a href="student-list-2.html" class="breadcrumb-link active">Student List 2</a>
                <span class="breadcrumb-separator">/</span>
                <a href="student-list-3.html" class="breadcrumb-link">Student List 3</a>
            </nav>
        </header>

        <div class="search-container">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search by student code, name, contact, or gender..."
                    class="search-input"
                >
                <button id="searchBtn" class="search-btn">Search</button>
                <button id="clearBtn" class="clear-btn">Clear</button>
            </div>
            <div class="search-info" id="searchInfo">
                Showing all students
            </div>

        <div class="table-container">
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>NO</th>
                        <th>STUDENT CODE</th>
                        <th>FULLNAME</th>
                        <th>[SEX]</th>
                        <th>CONTACT</th>
                        <th>CREATED DATE</th>
                        <th>ON/OFF</th>
                        <th>DELETE</th>
                        <th>EDIT</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Data will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

    <!-- Load student-data.js first, then script.js, then student-list-2.js -->
    <script src="JS/student-data.js"></script>
    <script src="JS/script.js"></script>
    <script src="JS/student-list-2.js"></script>
</body>
</html>
